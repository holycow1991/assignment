services:
  postgres_test:
    image: postgres:17-alpine
    container_name: assignment_postgres_test
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: assignment_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d assignment_test"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
